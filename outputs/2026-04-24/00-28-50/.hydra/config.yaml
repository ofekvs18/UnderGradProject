disease:
  name: t1d
  full_name: Type 1 Diabetes
  icd_patterns:
  - 250_1%
  - 250_3%
  icd_version: 9
ml:
  seed: 42
  baselines:
    lr_auc_roc: 0.658
    lr_auc_pr: 0.017
    m2_best_auc_pr: 0.0174
    gp_best_auc_roc: 0.6715
    gp_best_auc_pr: 0.0179
  method2:
    n_formulas: 10000
    bad_frac: 0.1
  method3:
    phase1_auc_pr_threshold: 0.016
    bad_frac: 0.1
    hall_of_fame: 50
    n_components: 50
    fitness:
      roc_weight: 0.5
      pr_weight: 2.0
    active_tiers:
    - small
    - medium
    - large
    gp_configs:
      small:
        population_size: 100
        generations: 20
        patience: 5
        parsimony_coefficient: 0.1
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - abs
      medium:
        population_size: 300
        generations: 50
        patience: 10
        parsimony_coefficient: 0.01
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - abs
      large:
        population_size: 500
        generations: 100
        patience: 20
        parsimony_coefficient: 0.01
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - abs
      huge:
        population_size: 20000
        generations: 500
        patience: 40
        parsimony_coefficient: 0.01
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - abs
  method4:
    model_id: google/medgemma-4b-it
    default_repeats: 4
    max_new_tokens: 1024
    do_sample: true
    functional_corr: 0.999
    n_formulas_per_call: 5
    temperatures:
    - 0.3
    - 0.7
    - 1.0
    cot_min_temperature: 0.7
pipeline:
  key_file: /home/ofekvi/.secrets/adc.json
  project: biomarkers-478606
  bq_dataset: biomarkers-478606.biomarkers
  dry_run: false
index_date:
  index_window_hours: 24
  lookback_days: 90
