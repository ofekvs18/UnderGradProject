disease:
  name: ra
  full_name: Rheumatoid Arthritis
  icd_patterns:
  - 714%
  icd_version: 9
  feature_relevance:
    hct: Often decreased due to anemia of chronic disease
    hgb: Reduced in anemia of chronic inflammation common in RA
    mch: May be reduced in iron-deficiency anemia secondary to RA
    mchc: Decreased in hypochromic anemias associated with RA
    mcv: Normocytic or microcytic pattern common in RA anemia
    plt: Reactive thrombocytosis is a well-documented marker of active RA
    rbc: Decreased count observed in RA-associated anemia
    rdw: Elevated RDW is a systemic inflammation marker linked to RA severity
    wbc: Can be elevated in active RA inflammation or lowered by immunosuppressive
      treatment
    neut_pct: Elevated in acute inflammation; NLR (neut_pct/lym_pct) is a validated
      RA severity marker
    lym_pct: Often reduced relative to neutrophils in RA, producing an elevated NLR
    mono_pct: Elevated in chronic autoimmune inflammation
    eos_pct: May be altered in autoimmune conditions and drug reactions
    baso_pct: Rarely elevated; limited direct RA relevance
ml:
  seed: 42
  baselines:
    lr_auc_roc: 0.0
    lr_auc_pr: 0.0
    m2_best_auc_pr: 0.0
    gp_best_auc_roc: 0.0
    gp_best_auc_pr: 0.0
  method2:
    n_formulas: 10000
    bad_frac: 0.1
  method3:
    phase1_auc_pr_threshold: 0.016
    bad_frac: 0.01
    hall_of_fame: 50
    n_components: 50
    fitness:
      roc_weight: 0.5
      pr_weight: 2.0
    active_tiers:
    - small
    - medium
    - large
    gp_configs:
      small:
        population_size: 100
        generations: 20
        patience: 5
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      medium:
        population_size: 300
        generations: 50
        patience: 10
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      large:
        population_size: 500
        generations: 100
        patience: 20
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
      huge:
        population_size: 20000
        generations: 500
        patience: 40
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
  method4:
    model_id: google/medgemma-4b-it
    default_repeats: 4
    max_new_tokens: 1024
    do_sample: true
    functional_corr: 0.999
    n_formulas_per_call: 5
    temperatures:
    - 0.3
    - 0.7
    - 1.0
    cot_min_temperature: 0.7
