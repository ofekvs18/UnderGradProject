disease:
  name: t1d
  full_name: Type 1 Diabetes
  icd_patterns:
  - 250_1%
  - 250_3%
  icd_version: 9
  feature_relevance:
    hct: Anemia common in T1D with renal complications (diabetic nephropathy)
    hgb: Reduced in nephropathy-related anemia; chronic hyperglycemia impairs erythropoiesis
    mch: May be altered in iron-deficiency or anemia of chronic disease
    mchc: Decreased in iron-deficiency; can reflect oxidative stress on RBCs in T1D
    mcv: Variable; normocytic typical; macrocytosis if B12/folate deficiency present
    plt: Platelet dysfunction and thrombocytosis reported with T1D vascular complications
    rbc: Reduced in diabetic nephropathy; glycation alters RBC morphology and survival
    rdw: Elevated RDW associated with T1D complications and oxidative stress
    wbc: Leukocytosis in DKA; chronic lymphopenia pattern in long-standing T1D
    neut_pct: Elevated in infection and DKA; NLR correlates with T1D cardiovascular
      risk
    lym_pct: Reduced in chronic hyperglycemia; autoimmune lymphocyte depletion patterns
    mono_pct: Elevated monocytes in chronic low-grade T1D inflammation
    eos_pct: Altered in autoimmune context of T1D; associated with atopic comorbidities
    baso_pct: Limited direct T1D relevance
ml:
  seed: 42
  baselines:
    lr_auc_roc: 0.0
    lr_auc_pr: 0.0
    m2_best_auc_pr: 0.0
    gp_best_auc_roc: 0.0
    gp_best_auc_pr: 0.0
  method2:
    n_formulas: 10000
    bad_frac: 0.1
  method3:
    phase1_auc_pr_threshold: 0.016
    bad_frac: 0.01
    hall_of_fame: 50
    n_components: 50
    fitness:
      roc_weight: 0.5
      pr_weight: 2.0
    active_tiers:
    - small
    - medium
    - large
    gp_configs:
      small:
        population_size: 100
        generations: 20
        patience: 5
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      medium:
        population_size: 300
        generations: 50
        patience: 10
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      large:
        population_size: 500
        generations: 100
        patience: 20
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
      huge:
        population_size: 20000
        generations: 500
        patience: 40
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
  method4:
    model_id: google/medgemma-4b-it
    default_repeats: 4
    max_new_tokens: 1024
    do_sample: true
    functional_corr: 0.999
    n_formulas_per_call: 5
    temperatures:
    - 0.3
    - 0.7
    - 1.0
    cot_min_temperature: 0.7
pipeline:
  key_file: /home/ofekvi/.secrets/adc.json
  project: biomarkers-478606
  bq_dataset: biomarkers-478606.biomarkers
  dry_run: false
split_salt: ''
index_date:
  index_window_hours: 24
  lookback_days: 90
