disease:
  name: lup
  full_name: Lupus erythematosus (DLE, SLE)
  icd_patterns:
  - 6954%
  - 7100%
  icd_version: 9
  feature_relevance:
    hct: Reduced in lupus-related hemolytic anemia or anemia of chronic disease
    hgb: Low in autoimmune hemolytic anemia; a major SLE manifestation
    mch: Reduced in hemolytic or iron-deficiency anemia in SLE
    mchc: Decreased in hemolytic anemia; reflects RBC destruction
    mcv: Variable; normocytic in hemolytic anemia; macrocytic with B12 deficiency
    plt: Thrombocytopenia is an SLE classification criterion; immune-mediated platelet
      destruction
    rbc: Reduced in autoimmune hemolytic anemia; a core SLE manifestation
    rdw: Elevated with active hemolytic anemia and mixed-deficiency states in SLE
    wbc: Leukopenia is an SLE classification criterion; reflects immune dysregulation
    neut_pct: Altered by lupus-driven neutropenia; NETosis links neutrophils to SLE
      pathogenesis
    lym_pct: Lymphopenia is an SLE classification criterion; key diagnostic marker
    mono_pct: Elevated monocytes in active SLE; drive interferon production
    eos_pct: Eosinophilia in lupus overlap syndromes; altered with multi-organ involvement
    baso_pct: Limited direct SLE relevance; may reflect immune dysregulation
ml:
  seed: 42
  baselines:
    lr_auc_roc: 0.0
    lr_auc_pr: 0.0
    m2_best_auc_pr: 0.0
    gp_best_auc_roc: 0.0
    gp_best_auc_pr: 0.0
  method2:
    n_formulas: 10000
    bad_frac: 0.1
  method3:
    phase1_auc_pr_threshold: 0.016
    bad_frac: 0.01
    hall_of_fame: 50
    n_components: 50
    fitness:
      roc_weight: 0.5
      pr_weight: 2.0
    active_tiers:
    - small
    - medium
    - large
    gp_configs:
      small:
        population_size: 100
        generations: 20
        patience: 5
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      medium:
        population_size: 300
        generations: 50
        patience: 10
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      large:
        population_size: 500
        generations: 100
        patience: 20
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
      huge:
        population_size: 20000
        generations: 500
        patience: 40
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
  method4:
    model_id: google/medgemma-4b-it
    default_repeats: 4
    max_new_tokens: 1024
    do_sample: true
    functional_corr: 0.999
    n_formulas_per_call: 5
    temperatures:
    - 0.3
    - 0.7
    - 1.0
    cot_min_temperature: 0.7
pipeline:
  key_file: /home/ofekvi/.secrets/adc.json
