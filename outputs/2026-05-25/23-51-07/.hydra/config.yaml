disease:
  name: crhn
  full_name: Crohn's Disease
  icd_patterns:
  - 555%
  icd_version: 9
  feature_relevance:
    hct: Reduced due to GI blood loss, malabsorption, and chronic intestinal inflammation
    hgb: Low in iron-deficiency anemia from GI bleeding and nutritional malabsorption
    mch: Reduced in iron-deficiency from chronic intestinal blood loss
    mchc: Decreased in iron deficiency; may reflect mixed deficiency with B12/folate
    mcv: Microcytic in iron deficiency; macrocytic in B12/folate deficiency — mixed
      patterns common
    plt: Reactive thrombocytosis in active IBD; correlates with disease activity
    rbc: Reduced in GI blood loss and nutritional deficiency
    rdw: Elevated in mixed-deficiency anemia; correlates with IBD disease activity
    wbc: Leukocytosis in active flares; reflects intestinal and systemic inflammation
    neut_pct: Elevated in active flares; neutrophil-to-lymphocyte ratio tracks IBD
      disease activity
    lym_pct: Reduced during active disease and in patients on immunosuppressants
    mono_pct: Elevated in chronic intestinal inflammation
    eos_pct: Elevated in eosinophilic colitis; eosinophilic infiltration is part of
      IBD pathology
    baso_pct: Limited direct relevance; may reflect systemic allergic or immune activation
ml:
  seed: 42
  baselines:
    lr_auc_roc: 0.0
    lr_auc_pr: 0.0
    m2_best_auc_pr: 0.0
    gp_best_auc_roc: 0.0
    gp_best_auc_pr: 0.0
  method2:
    n_formulas: 10000
    bad_frac: 0.1
  method3:
    phase1_auc_pr_threshold: 0.016
    bad_frac: 0.01
    hall_of_fame: 50
    n_components: 50
    fitness:
      roc_weight: 0.5
      pr_weight: 2.0
    active_tiers:
    - small
    - medium
    - large
    gp_configs:
      small:
        population_size: 100
        generations: 20
        patience: 5
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      medium:
        population_size: 300
        generations: 50
        patience: 10
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
      large:
        population_size: 500
        generations: 100
        patience: 20
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
      huge:
        population_size: 20000
        generations: 500
        patience: 40
        parsimony_coefficient: 0.001
        function_set:
        - add
        - sub
        - mul
        - div
        - sqrt
        - log
        - neg
        max_samples: 0.5
  method4:
    model_id: google/medgemma-4b-it
    default_repeats: 4
    max_new_tokens: 1024
    do_sample: true
    functional_corr: 0.999
    n_formulas_per_call: 5
    temperatures:
    - 0.3
    - 0.7
    - 1.0
    cot_min_temperature: 0.7
