# ML parameters for all method scripts.
# All hardcoded values that control experiment behaviour live here.

seed: 42

# Values below are reset in Issue #30 and will be repopulated by sanity_check.py
baselines:
  lr_auc_roc: 0.0   # reset — recompute after Issue 30 rerun
  lr_auc_pr:  0.0   # reset — recompute after Issue 30 rerun
  m2_best_auc_pr:  0.0
  gp_best_auc_roc: 0.0
  gp_best_auc_pr:  0.0

# Method 2: Random formula search
method2:
  n_formulas: 10000
  bad_frac: 0.10  # skip formula if > this fraction of rows produce NaN/inf

# Method 3: Genetic Programming
method3:
  phase1_auc_pr_threshold: 0.016
  bad_frac: 0.01
  hall_of_fame: 50
  n_components: 50
  fitness:
    roc_weight: 2.0  # primary signal — 3× less noisy than AUC-PR at low prevalence
    pr_weight: 0.5
  active_tiers: [small, medium, large]
  gp_configs:
    small:
      population_size: 100
      generations: 20
      patience: 5
      parsimony_coefficient: 0.001  # HIGHER: Stronger penalty for long formulas
      function_set: [add, sub, mul, div, sqrt, log, neg]
    medium:
      population_size: 300
      generations: 50
      patience: 10
      parsimony_coefficient: 0.001  # HIGHER: Stronger penalty for long formulas
      function_set: [add, sub, mul, div, sqrt, log, neg]
    large:
      population_size: 500
      generations: 100
      patience: 20
      parsimony_coefficient: 0.001  # HIGHER: Stronger penalty for long formulas
      function_set: [add, sub, mul, div, sqrt, log, neg]
      max_samples: 0.5

    huge:
      population_size: 20000
      generations: 500
      patience: 40
      parsimony_coefficient: 0.001  # HIGHER: Stronger penalty for long formulas
      function_set: [add, sub, mul, div, sqrt, log, neg]
      max_samples: 0.5



# Method 4: LLM-based formula generation
method4:
  model_id: google/medgemma-4b-it
  default_repeats: 4
  max_new_tokens: 1024
  do_sample: true
  functional_corr: 0.999  # deduplication: drop formula if corr >= this with an existing one
  n_formulas_per_call: 5
  temperatures: [0.3, 0.7, 1.0]
  cot_min_temperature: 0.7  # enable chain-of-thought for temperatures >= this value
