# NHANES dataset configuration
#
# NHANES data is organized in component files per survey cycle.
# Each cycle has a letter suffix: G=2011-2012, H=2013-2014, I=2015-2016, J=2017-2018.
# Files are SAS XPT format, readable via pandas.read_sas().
#
# File layout accepted (both are auto-detected):
#   Flat   : <nhanes_dir>/CBC_H.XPT
#   Subdir : <nhanes_dir>/H/CBC_H.XPT
#
# IMPORTANT: Verify variable names and response codes against the NHANES
# codebooks for your target cycles before running extraction.
# Codebooks: https://wwwn.cdc.gov/nchs/nhanes/

# CBC laboratory variable names (consistent across cycles G–J).
# NHANES stores CBC in component files named CBC_<cycle>.XPT.
cbc_vars:
  wbc:  LBXWBCSI   # Leukocytes [1000 cells/µL]
  rbc:  LBXRBCSI   # Erythrocytes [million cells/µL]
  hgb:  LBXHGB     # Hemoglobin [g/dL]
  hct:  LBXHCT     # Hematocrit [%]
  mcv:  LBXMCVSI   # Mean Cell Volume [fL]
  mch:  LBXMCHSI   # Mean Cell Hemoglobin [pg]
  mchc: LBXMC      # Mean Cell Hemoglobin Concentration [g/dL]
  plt:  LBXPLTSI   # Platelets [1000 cells/µL]
  rdw:  LBXRDW     # Red Cell Distribution Width [%]

# Survey cycles included by default (cycle letter → year range label).
cycles:
  G: "2011-2012"
  H: "2013-2014"
  I: "2015-2016"
  J: "2017-2018"

# Component file name templates (format with cycle letter, e.g. "CBC_H.XPT")
cbc_file:  "CBC_{}.XPT"
demo_file: "DEMO_{}.XPT"   # demographics file (for SEQN list only)

# Disease case definitions.
# Each disease entry is a list of conditions (all must be met — AND logic).
# Each condition specifies which questionnaire file and which variable/values
# identify a positive case for that condition.
#
# Supported disease slugs: ra, psr
# (must match conf/disease/<slug>.yaml slugs)
#
# IMPORTANT: response code meanings differ by cycle. Verify against codebooks.
disease_case_defs:
  ra:
    - file: "MCQ_{}.XPT"   # Medical Conditions Questionnaire
      variable: "MCQ160a"  # "Doctor told you have arthritis?" 1=Yes
      values: [1]
    - file: "MCQ_{}.XPT"
      variable: "MCQ195"   # "What kind of arthritis?" 2=Rheumatoid (cycles G-J)
      values: [2]

  psr:
    - file: "MCQ_{}.XPT"
      variable: "MCQ070"  # "Doctor told you have psoriasis?" 1=Yes (cycles G-H)
      values: [1]

# Per-disease cycle overrides (optional). When set, restricts extraction to
# the listed cycles regardless of the --cycles CLI flag or the global cycles list.
disease_cycles:
  psr: ["G", "H"]   # MCQ070 only present in 2011-2014

# Random seed for patient-level train/test split
seed: 42

# Fraction of patients held out for test
test_frac: 0.20
