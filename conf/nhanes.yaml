# NHANES dataset configuration
#
# NHANES data is organized in component files per survey cycle.
# Each cycle has a letter suffix: G=2011-2012, H=2013-2014, I=2015-2016, J=2017-2018.
# Files are SAS XPT format, readable via pandas.read_sas().
#
# File layout accepted (both are auto-detected):
#   Flat   : <nhanes_dir>/CBC_H.XPT
#   Subdir : <nhanes_dir>/H/CBC_H.XPT
#
# IMPORTANT: Verify variable names and response codes against the NHANES
# codebooks for your target cycles before running extraction.
# Codebooks: https://wwwn.cdc.gov/nchs/nhanes/

# CBC laboratory variable names (consistent across cycles G–J).
# NHANES stores CBC in component files named CBC_<cycle>.XPT.
cbc_vars:
  wbc:  LBXWBCSI   # Leukocytes [1000 cells/µL]
  rbc:  LBXRBCSI   # Erythrocytes [million cells/µL]
  hgb:  LBXHGB     # Hemoglobin [g/dL]
  hct:  LBXHCT     # Hematocrit [%]
  mcv:  LBXMCVSI   # Mean Cell Volume [fL]
  mch:  LBXMCHSI   # Mean Cell Hemoglobin [pg]
  mchc: LBXMC      # Mean Cell Hemoglobin Concentration [g/dL]
  plt:  LBXPLTSI   # Platelets [1000 cells/µL]
  rdw:  LBXRDW     # Red Cell Distribution Width [%]

# Survey cycles included by default (cycle letter → year range label).
cycles:
  G: "2011-2012"
  H: "2013-2014"
  I: "2015-2016"
  J: "2017-2018"

# Component file name templates (format with cycle letter, e.g. "CBC_H.XPT")
cbc_file:  "CBC_{}.XPT"
demo_file: "DEMO_{}.XPT"   # demographics file (for SEQN list only)

# Disease case definitions.
# Each disease entry is a list of conditions (all must be met — AND logic).
# Each condition specifies which questionnaire file and which variable/values
# identify a positive case for that condition.
#
# Active diseases: ra, psr
# Excluded diseases: lup, crhn, t1d, t2d (see entries below)
#
# Variable names are uppercased after read_sas() — use uppercase here.
# Response codes verified against XPT files directly (see test_hydra_config.py output).
disease_case_defs:
  ra:
    # Step 1: ever told you had arthritis (MCQ160A=1)
    # Step 2: type is rheumatoid arthritis (MCQ195=1)
    # Verified in XPT: MCQ160A present G/H/I/J, MCQ195 present G/H/I/J
    # MCQ195 codes confirmed from XPT value_counts and published literature:
    #   1 = Rheumatoid arthritis
    #   2 = Osteoarthritis / degenerative arthritis
    #   3 = Psoriatic arthritis
    #   4 = Other
    #   7 = Refused, 9 = Don't know
    - file: "MCQ_{}.XPT"
      variable: "MCQ160A"
      values: [1]
    - file: "MCQ_{}.XPT"
      variable: "MCQ195"
      values: [1]

  psr:
    # MCQ070=1: "Has a doctor ever told you that you have psoriasis?"
    # Verified in XPT: present in G (167 cases) and H (162 cases), absent in I and J
    # Cycle restriction enforced via disease_cycles.psr below
    - file: "MCQ_{}.XPT"
      variable: "MCQ070"
      values: [1]

  lup:
    excluded: true
    reason: >
      MCQ191 (lupus variable used in NHANES 2001-2010) is absent from cycles G-J.
      MCQ160n in these cycles = gout, not lupus.
      No valid lupus variable exists in the current cycles (2011-2018).

  crhn:
    excluded: true
    reason: >
      MCQ203 in cycles G-J = jaundice, not Crohn's disease.
      IBD question was discontinued after cycle F (2009-10).
      No valid Crohn's variable exists in cycles G-J.

  t1d:
    excluded: true
    reason: >
      DIQ010 captures all diabetes without type distinction.
      T1/T2 separation requires age-at-diagnosis + insulin-only treatment algorithm
      (DID040Q absent in cycles G-J; feasibility unconfirmed).

  t2d:
    excluded: true
    reason: >
      Same limitation as t1d — DIQ010 does not distinguish type.

# Per-disease cycle overrides.
# Restricts extraction to listed cycles regardless of global cycles list or --cycles flag.
disease_cycles:
  psr: ["G", "H"]   # MCQ070 absent from cycles I and J (confirmed via XPT scan)

# Random seed for patient-level train/test split
seed: 42

# Fraction of patients held out for test
test_frac: 0.20