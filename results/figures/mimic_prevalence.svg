<svg xmlns="http://www.w3.org/2000/svg" width="620" height="360" font-family="Arial, Helvetica, sans-serif">
  <!-- background -->
  <rect width="620" height="360" fill="white"/>

  <!-- plot area: x0=150, y0=30, x1=590, y1=295  (width=440, height=265) -->
  <!-- x scale: 0–14%, scale = 440/14 = 31.429 px/% -->
  <!-- 6 bars, barH=30, gap=12, total=6*30+5*12=240, padding=(265-240)/2=12.5 -->
  <!-- bar y starts: y0 + 12.5 + i*(30+12) -->

  <!-- dashed vertical grid lines -->
  <line x1="150" y1="30" x2="150" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="213.3" y1="30" x2="213.3" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="276.6" y1="30" x2="276.6" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="339.9" y1="30" x2="339.9" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="403.1" y1="30" x2="403.1" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="466.4" y1="30" x2="466.4" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="529.7" y1="30" x2="529.7" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="593.0" y1="30" x2="593.0" y2="295" stroke="#d0c0d8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- bar 0: T2D  12.729% → 12.729*31.429 = 400.0 -->
  <rect x="150" y="42.5"  width="400.0" height="30" fill="#C49FC4" rx="2"/>
  <!-- bar 1: T1D  1.079% → 33.9 -->
  <rect x="150" y="84.5"  width="33.9"  height="30" fill="#C49FC4" rx="2"/>
  <!-- bar 2: RA   1.074% → 33.8 -->
  <rect x="150" y="126.5" width="33.8"  height="30" fill="#C49FC4" rx="2"/>
  <!-- bar 3: Crohn's 0.796% → 25.0 -->
  <rect x="150" y="168.5" width="25.0"  height="30" fill="#C49FC4" rx="2"/>
  <!-- bar 4: Psoriasis 0.573% → 18.0 -->
  <rect x="150" y="210.5" width="18.0"  height="30" fill="#C49FC4" rx="2"/>
  <!-- bar 5: Lupus 0.390% → 12.3 -->
  <rect x="150" y="252.5" width="12.3"  height="30" fill="#C49FC4" rx="2"/>

  <!-- value labels at end of each bar -->
  <text x="555.0" y="62.5"  font-size="11" fill="#7a5a8a" dominant-baseline="middle">12.73%</text>
  <text x="188.9" y="99.5"  font-size="11" fill="#7a5a8a" dominant-baseline="middle">1.08%</text>
  <text x="188.8" y="141.5" font-size="11" fill="#7a5a8a" dominant-baseline="middle">1.07%</text>
  <text x="179.0" y="183.5" font-size="11" fill="#7a5a8a" dominant-baseline="middle">0.80%</text>
  <text x="172.0" y="225.5" font-size="11" fill="#7a5a8a" dominant-baseline="middle">0.57%</text>
  <text x="166.3" y="267.5" font-size="11" fill="#7a5a8a" dominant-baseline="middle">0.39%</text>

  <!-- y-axis disease labels (right-aligned, centered on bar) -->
  <text x="143" y="57.5"  text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">T2D</text>
  <text x="143" y="99.5"  text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">T1D</text>
  <text x="143" y="141.5" text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">RA</text>
  <text x="143" y="183.5" text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">Crohn&#x2019;s</text>
  <text x="143" y="225.5" text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">Psoriasis</text>
  <text x="143" y="267.5" text-anchor="end" font-size="12" fill="#444" dominant-baseline="middle">Lupus</text>

  <!-- x-axis baseline -->
  <line x1="150" y1="295" x2="593" y2="295" stroke="#bbb" stroke-width="1"/>

  <!-- x-axis tick labels -->
  <text x="150"  y="312" text-anchor="middle" font-size="11" fill="#666">0</text>
  <text x="213.3" y="312" text-anchor="middle" font-size="11" fill="#666">2</text>
  <text x="276.6" y="312" text-anchor="middle" font-size="11" fill="#666">4</text>
  <text x="339.9" y="312" text-anchor="middle" font-size="11" fill="#666">6</text>
  <text x="403.1" y="312" text-anchor="middle" font-size="11" fill="#666">8</text>
  <text x="466.4" y="312" text-anchor="middle" font-size="11" fill="#666">10</text>
  <text x="529.7" y="312" text-anchor="middle" font-size="11" fill="#666">12</text>
  <text x="593.0" y="312" text-anchor="middle" font-size="11" fill="#666">14</text>

  <!-- x-axis label -->
  <text x="371" y="340" text-anchor="middle" font-size="13" fill="#444">Prevalence (%)</text>

  <!-- y-axis header label -->
  <text x="10" y="20" font-size="13" fill="#444">Disease</text>
</svg>
