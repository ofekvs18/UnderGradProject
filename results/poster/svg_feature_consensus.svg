<svg viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Arial, sans-serif">
  <rect width="620" height="320" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="310" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">Cross-Method Feature Consensus — RA</text>
  <text x="310" y="42" text-anchor="middle" font-size="10" fill="#7F8C8D">Feature importance across all 4 methods (normalized, RA disease)</text>

  <!-- Column headers -->
  <g text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">
    <rect x="200" y="55" width="90" height="24" rx="4" fill="#E8773D"/>
    <text x="245" y="71">M3: GP</text>
    <rect x="300" y="55" width="90" height="24" rx="4" fill="#1A7A8A"/>
    <text x="345" y="71">M4: LLM</text>
    <rect x="400" y="55" width="90" height="24" rx="4" fill="#7F8C8D"/>
    <text x="445" y="71">M1: Thresh.</text>
    <rect x="500" y="55" width="90" height="24" rx="4" fill="#2C3E50"/>
    <text x="545" y="71">M2: Random</text>
  </g>

  <!-- Feature rows -->
  <!-- Data: feature, GP%, LLM%, Thresh%, Random% -->
  <!-- Colors: high=orange, mid=teal, low=light -->

  <defs>
    <linearGradient id="heatHigh" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#E8773D"/>
      <stop offset="100%" stop-color="#F0A87C"/>
    </linearGradient>
  </defs>

  <!-- Helper: cell fill based on value -->
  <!-- Row 1: RDW -->
  <text x="190" y="102" text-anchor="end" font-size="12" font-weight="bold" fill="#E8773D">RDW</text>
  <!-- GP: 85% -->
  <rect x="202" y="84" width="86" height="28" rx="4" fill="#E8773D" opacity="0.9"/>
  <text x="245" y="102" text-anchor="middle" font-size="11" fill="white" font-weight="bold">85%</text>
  <!-- LLM: 64% -->
  <rect x="302" y="84" width="86" height="28" rx="4" fill="#1A7A8A" opacity="0.7"/>
  <text x="345" y="102" text-anchor="middle" font-size="11" fill="white">64%</text>
  <!-- Thresh: 100% (RDW top AUC-ROC) -->
  <rect x="402" y="84" width="86" height="28" rx="4" fill="#7F8C8D" opacity="0.9"/>
  <text x="445" y="102" text-anchor="middle" font-size="11" fill="white">100%</text>
  <!-- Random: 40% -->
  <rect x="502" y="84" width="86" height="28" rx="4" fill="#2C3E50" opacity="0.5"/>
  <text x="545" y="102" text-anchor="middle" font-size="11" fill="white">40%</text>

  <!-- Row 2: PLT -->
  <text x="190" y="142" text-anchor="end" font-size="12" font-weight="bold" fill="#E8773D">PLT</text>
  <rect x="202" y="124" width="86" height="28" rx="4" fill="#E8773D" opacity="0.95"/>
  <text x="245" y="142" text-anchor="middle" font-size="11" fill="white" font-weight="bold">90%</text>
  <rect x="302" y="124" width="86" height="28" rx="4" fill="#1A7A8A" opacity="0.6"/>
  <text x="345" y="142" text-anchor="middle" font-size="11" fill="white">54%</text>
  <rect x="402" y="124" width="86" height="28" rx="4" fill="#7F8C8D" opacity="0.5"/>
  <text x="445" y="142" text-anchor="middle" font-size="11" fill="white">50%</text>
  <rect x="502" y="124" width="86" height="28" rx="4" fill="#2C3E50" opacity="0.7"/>
  <text x="545" y="142" text-anchor="middle" font-size="11" fill="white">60%</text>

  <!-- Row 3: MCHC -->
  <text x="190" y="182" text-anchor="end" font-size="12" font-weight="bold" fill="#E8773D">MCHC</text>
  <rect x="202" y="164" width="86" height="28" rx="4" fill="#E8773D" opacity="0.8"/>
  <text x="245" y="182" text-anchor="middle" font-size="11" fill="white" font-weight="bold">75%</text>
  <rect x="302" y="164" width="86" height="28" rx="4" fill="#1A7A8A" opacity="0.5"/>
  <text x="345" y="182" text-anchor="middle" font-size="11" fill="white">45%</text>
  <rect x="402" y="164" width="86" height="28" rx="4" fill="#7F8C8D" opacity="0.4"/>
  <text x="445" y="182" text-anchor="middle" font-size="11" fill="white">40%</text>
  <rect x="502" y="164" width="86" height="28" rx="4" fill="#2C3E50" opacity="0.6"/>
  <text x="545" y="182" text-anchor="middle" font-size="11" fill="white">55%</text>

  <!-- Row 4: mono_pct -->
  <text x="190" y="222" text-anchor="end" font-size="12" fill="#2C3E50">mono_pct</text>
  <rect x="202" y="204" width="86" height="28" rx="4" fill="#E8773D" opacity="0.7"/>
  <text x="245" y="222" text-anchor="middle" font-size="11" fill="white">65%</text>
  <rect x="302" y="204" width="86" height="28" rx="4" fill="#1A7A8A" opacity="0.2"/>
  <text x="345" y="222" text-anchor="middle" font-size="11" fill="#555">15%</text>
  <rect x="402" y="204" width="86" height="28" rx="4" fill="#7F8C8D" opacity="0.15"/>
  <text x="445" y="222" text-anchor="middle" font-size="11" fill="#777">10%</text>
  <rect x="502" y="204" width="86" height="28" rx="4" fill="#2C3E50" opacity="0.2"/>
  <text x="545" y="222" text-anchor="middle" font-size="11" fill="#555">20%</text>

  <!-- Row 5: RBC -->
  <text x="190" y="262" text-anchor="end" font-size="12" fill="#2C3E50">RBC</text>
  <rect x="202" y="244" width="86" height="28" rx="4" fill="#E8773D" opacity="0.45"/>
  <text x="245" y="262" text-anchor="middle" font-size="11" fill="white">40%</text>
  <rect x="302" y="244" width="86" height="28" rx="4" fill="#1A7A8A" opacity="0.15"/>
  <text x="345" y="262" text-anchor="middle" font-size="11" fill="#555">12%</text>
  <rect x="402" y="244" width="86" height="28" rx="4" fill="#7F8C8D" opacity="0.8"/>
  <text x="445" y="262" text-anchor="middle" font-size="11" fill="white">80%</text>
  <rect x="502" y="244" width="86" height="28" rx="4" fill="#2C3E50" opacity="0.55"/>
  <text x="545" y="262" text-anchor="middle" font-size="11" fill="white">50%</text>

  <!-- Consensus badge -->
  <rect x="202" y="283" width="386" height="26" rx="4" fill="#D6EAF0" stroke="#1A7A8A" stroke-width="1.5"/>
  <text x="395" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A7A8A">RDW · PLT · MCHC — consensus features across all methods</text>
</svg>
